  <path d="M1056 392C1216 478 1364 646 1538 914" fill="none" stroke="url(#haze)" stroke-width="170" stroke-linecap="round" filter="url(#soft)"/>
  <path d="M0 744C236 702 411 790 662 754C890 722 1044 672 1279 728C1513 784 1692 720 1920 686V1080H0Z" fill="url(#floor)"/>
  <path d="M0 818C310 766 505 856 782 816C1044 779 1215 732 1465 786C1635 823 1782 805 1920 756V1080H0Z" fill="#010101" opacity="0.94"/>

