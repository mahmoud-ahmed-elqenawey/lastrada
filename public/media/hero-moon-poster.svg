<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Moonlit cinematic production scene">
  <defs>
    <radialGradient id="sky" cx="70%" cy="28%" r="72%">
      <stop offset="0" stop-color="#163a4b"/>
      <stop offset="0.34" stop-color="#091316"/>
      <stop offset="0.72" stop-color="#030404"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="moon" cx="44%" cy="38%" r="62%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.55" stop-color="#eefbff"/>
      <stop offset="0.78" stop-color="#bdefff"/>
      <stop offset="1" stop-color="#6ec8e6"/>
    </radialGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#30a9dc" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#30a9dc" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#f9a72b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f4197" stop-opacity="0.2"/>
      <stop offset="0.46" stop-color="#050505"/>
      <stop offset="1" stop-color="#ef4639" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.72" numOctaves="2" seed="11" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <circle cx="1358" cy="260" r="310" fill="#30a9dc" opacity="0.13" filter="url(#soft)"/>
  <circle cx="1358" cy="260" r="128" fill="url(#moon)"/>
